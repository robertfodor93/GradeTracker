<mat-toolbar class="mat-toolbar-single-row">
  <span>{{this.title}}</span>
</mat-toolbar>

<mat-form-field>
  <mat-label>Filter Modul</mat-label>
  <mat-select matNativeControl #post class="input-field" (selectionChange)="onChange($event)">
      <mat-option *ngFor="let post of posts" [value]="post.name" name="fach">
          {{post.name}}
      </mat-option>
  </mat-select>
</mat-form-field>
<mat-form-field appearance="standard">
  <mat-label>Search</mat-label>
  <input matInput (keyup)="applyFilter($event)" #input>
</mat-form-field>

<mat-tab-group>
  <mat-tab label="EFZ">
    <table id="table"mat-table [dataSource]="dataSourceEFZ" multiTemplateDataRows class="mat-elevation-z8" matSort
      (matSortChange)="announceSortChange($event)">
      <ng-container  matColumnDef="{{column}}" *ngFor="let column of displayedColumnsSubject">
        <th mat-header-cell   class="headerrow" *matHeaderCellDef mat-sort-header sortActionDescription="Sort by column">
          {{column}} </th>
        <td mat-cell id="{{column}}" *matCellDef="let element">{{element[column]}} </td>
      </ng-container>



      <!-- Exams-->
      <ng-container matColumnDef="expandedDetail">
        <td mat-cell *matCellDef="let element"[attr.colspan]="displayedColumnsSubject.length">
          <div class="example-element-detail" [@detailExpand]="element == expandedElements ? 'expanded' : 'collapsed'">

            <mat-table [dataSource]=" dataSourceEFZexam " multiTemplateDataRows class="innertable" matSort
              (matSortChange)="announceSortChange($event)">
              <mat-header-row *matHeaderRowDef="displayedColumnsExam"></mat-header-row>
              <mat-row *matRowDef="let row; columns: displayedColumnsExam;"></mat-row>
              <ng-container matColumnDef="{{column}}" *ngFor="let column of displayedColumnsExam">
                <mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by column"
                  class="row"> {{column}}</mat-header-cell>
                <mat-cell *matCellDef="let element" class="row"> {{element[column]}} </mat-cell>
              </ng-container>
            </mat-table>

          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumnsSubject"></tr>
      <tr mat-row   *matRowDef="let element; columns: displayedColumnsSubject;" class="example-element-row"
        [class.example-expanded-row]="expandedElements === element"
        (click)="expandedElements = expandedElements === element ? null : element"
        (click)="filterExam()">
      </tr>
      <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="example-detail-row"></tr>
    </table>
  </mat-tab>



  <!--BM Noten-->
  <mat-tab label="BM">
    <table mat-table [dataSource]="dataSourceBM" multiTemplateDataRows class="mat-elevation-z8" matSort
      (matSortChange)="announceSortChange($event)">
      <ng-container matColumnDef="{{column}}" *ngFor="let column of displayedColumnsSubject">
        <th mat-header-cell class="headerrow" *matHeaderCellDef mat-sort-header sortActionDescription="Sort by column">
          {{column}} </th>
        <td mat-cell *matCellDef="let element">{{element[column]}} </td>
      </ng-container>

      <ng-container matColumnDef="expand">
        <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button aria-label="expand row"
            (click)="(expandedElements = expandedElements === element ? null : element); $event.stopPropagation()">
            <mat-icon *ngIf="expandedElements !== element">keyboard_arrow_down</mat-icon>
            <mat-icon *ngIf="expandedElements === element">keyboard_arrow_up</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Exams-->
      <ng-container matColumnDef="expandedDetail">
        <td mat-cell *matCellDef="let element" [attr.colspan]="displayedColumnsSubject.length">
          <div class="example-element-detail" [@detailExpand]="element == expandedElements ? 'expanded' : 'collapsed'">
            <div *ngFor="let a of dataSourceEFZ.data ">
              ({{a.id}}){{a.name}} 
              <div *ngFor="let b of dataSourceEFZexam.data">
                <div *ngIf="b.moduleId === a.id">
                  {{b.grade}}({{b.moduleId}})
                </div>
              </div>
            </div>
         
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumnsSubject"></tr>
      <tr mat-row *matRowDef="let element; columns: displayedColumnsSubject;" class="example-element-row"
        [class.example-expanded-row]="expandedElements === element"
        (click)="expandedElements = expandedElements === element ? null : element">
      </tr>
      <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="example-detail-row"></tr>
    </table>
  </mat-tab>
</mat-tab-group>

<button class="buttonNew" mat-raised-button (click)="openDialog()">Neue Noten erfassen</button>



<div *ngFor="let a of dataSourceEFZ.data ">
  ({{a.id}}){{a.name}} 
  <div *ngFor="let b of dataSourceEFZexam.data">
    <div *ngIf="b.moduleId === a.id">
      {{b.grade}}({{b.moduleId}})
    </div>
  </div>
</div>
