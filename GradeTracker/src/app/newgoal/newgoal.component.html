<h2>Zielerfassung</h2>
<mat-divider></mat-divider>
<div mat-dialog-actions>
    <form [formGroup]="newGoal" (ngSubmit)="onSubmit()">

        <label for="name">Fach</label>
    
        <mat-select matNativeControl class="input-field" formControlName="fach">
            <mat-option *ngFor="let post of posts" [value]="1" name="fach" >
                {{post.name}}
            </mat-option>
        </mat-select>

        <br>
        <div formGroupName="goal">
            <label for="goal">Ziel</label>
            <input type="number" max="6" min="1" formControlName="goal"  name="goal" required>
        </div>
        <br>

        <br>
        <button class="buttonCancel" [mat-dialog-close]="">Abbrechen</button>
        <button type="submit" class="buttonSubmit" cdkFocusInitial>Speichern</button>


    </form>

</div>
