<h2>Zielerfassung</h2>
<mat-divider></mat-divider>
<div mat-dialog-actions>
    <form [formGroup]="newGoalForm" (ngSubmit)="onSubmit()">
        <label for="name">Fach</label>

        <mat-select matNativeControl #post class="input-field" formControlName="id" name="id">
            <mat-option *ngFor="let module of modules" [value]="module.id" name="module" >
                {{module.name}}
            </mat-option>
        </mat-select>

        <br>
        <div>
            <label for="goal">Ziel</label>
            <input type="number" max="6" min="1" formControlName="averageDesiredMark" name="averageDesiredMark" required>
        </div>
        <br>

        <br>
        <button class="buttonCancel" [mat-dialog-close]="" cdkFocusInitial>Abbrechen</button>
        <button class="submit">Speichern</button>
    </form>


</div>
