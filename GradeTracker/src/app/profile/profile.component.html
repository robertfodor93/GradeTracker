<mat-toolbar>
    <span>{{this.title}}</span>
  </mat-toolbar>

<div class="container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <h1>Profil</h1>
            </mat-card-title>
            <mat-card-subtitle>Bearbeiten Sie ihren Account für den Grade-Tracker!</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <img src="./assets/pic/profil.jpg" class="profil"> <br><br>
            <mat-form-field>
                <input class="input-field" type="text" value="Max Mustermann" [readonly]="isReadOnly">
                <input class="input-field" type="email" value="m.mustermann@gmail.com" [readonly]="isReadOnly">
                <input class="input-field" type="password" value="adsfadsf" [readonly]="isReadOnly">

                <select class="input-field" disabled>
                    <option selected>EFZ</option>
                    <option>IMS</option>
                    <option>EFZ mit BM</option>
                </select>

                <button click="edit()" id="bearbeiten-button" class="bearbeiten-button">Bearbeiten</button>
            </mat-form-field>

        </mat-card-content>
    </mat-card>
</div>
