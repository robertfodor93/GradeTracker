<h2>Fach/Modulerfassung</h2>
<mat-divider></mat-divider>
<div mat-dialog-actions>
    <form [formGroup] = "createModuleForm" (ngSubmit)="onSubmit()">
        <label for="name">Name</label>
        <input type="text" formControlName="name" required>
        <br>
        <label for="fachtyp">Fachtyp</label>
        <select id="educationType" formControlName="educationTypeId" [(ngModel)]="selectedEducationTypeId" (change)="competenceAreasByEducationType()" required>
            <option *ngFor="let educationType of educationTypes" [ngValue]="educationType.id">
                {{educationType.name}}
            </option>
        </select>
        <br>
        <br>
        <label for="fachtyp">Fachtyp</label>
        <select id="competenceArea" formControlName="competenceAreaId" required>
            <option *ngFor="let competenceArea of competenceAreas" [ngValue]="competenceArea.id">
                {{competenceArea.name}}
            </option>
        </select>
        <br>
        <div formGroupName="teacher">
        <label for="lehrperson">Lehrperson</label>
        <input type="text" formControlName="name" form required>
        </div>
        <br>

        <label for="favorit">Favorit</label>
        <input type="checkbox" formControlName="showOnDashboard" value="favorit" required>

        <br>
        <button class="buttonCancel" [mat-dialog-close]="">Abbrechen</button>
        <button type="submit" class="buttonSubmit"  cdkFocusInitial>Speichern</button>
        
        
    </form>

</div>
