<h2>Fach/Modulerfassung</h2>
<mat-divider></mat-divider>
<div mat-dialog-actions>
    <form #userPost="ngForm" (ngSubmit)="onSubmit(userPost.value)">
        <label for="name">Name</label>
        <input type="text" ngModel id="name" name="name" required>
        <br>
        <label for="fachtyp">Fachtyp</label>
        <select id="competenceArea" ngModel name="competenceArea" class="input-field" required>
            <option value="1">BM</option>
            <option value="2">EFZ</option>
        </select>
        <br>
        <label for="lehrperson">Lehrperson</label>
        <input type="text" ngModel id="teacher" name="teacher" required>
        <br>

        <label for="favorit">Favorit</label>
        <input type="checkbox" ngModel name="showOnDashboard" value="favorit" required>

        <br>
        <button class="buttonCancel" [mat-dialog-close]="">Abbrechen</button>
        <button type="submit" class="buttonSubmit"  cdkFocusInitial>Speichern</button>
        
        
    </form>

</div>
