<mat-toolbar class="mat-toolbar-single-row">
    <span>{{this.title}}</span>
  </mat-toolbar>



  <mat-form-field appearance="standard">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)" #input>
</mat-form-field>


  
<table mat-table [dataSource]="dataSourceGoal" matSort (matSortChange)="announceSortChange($event)"
  class="mat-elevation-z8">

  <!-- subject Column -->
  <ng-container matColumnDef="fach">
      <mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by fach">
          Fach
      </mat-header-cell>
      
  </ng-container>

  <!-- ziel Column -->
  <ng-container matColumnDef="averageDesiredMark">
      <mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by averageDesiredMark">
          Ziel
      </mat-header-cell>
      <mat-cell *matCellDef="let element"> {{element.averageDesiredMark}} </mat-cell>
  </ng-container>

  <!-- benötigte Note Column -->
  <ng-container matColumnDef="needed">
      <mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by needed">
          Benötigte Note
      </mat-header-cell>
      
  </ng-container>

  

  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
  <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
</table>

<button class="buttonNew" mat-raised-button (click)="openDialog()">Neues Ziel erfassen</button>
