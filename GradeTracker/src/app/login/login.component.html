<div class="container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <h1>Login</h1>
            </mat-card-title>
            <mat-card-subtitle>Loggen sie sich in ihren Grade-Tracker Account ein!</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <mat-form-field>
                <input matInput class="input-field" type="email" placeholder="Email"> <br> <br>
                <input matInput class="input-field" type="password" placeholder="Password">

            </mat-form-field>
        </mat-card-content>
        <button type="submit" class="submit-button">Login</button>

        <div class="linkToRegister">
            <a routerLink="/registration">Noch kein Konto?</a>
        </div>


    </mat-card>
</div>
